<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | SmartX</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-page">
    <main class="login-layout">
      <section class="login-card" aria-labelledby="login-title">
        <header class="login-card-header">
          <h1 id="login-title" class="login-brand">SmartX</h1>
          <p class="login-subtitle">Authenticate User</p>
        </header>

        <form class="login-form" action="index.html" method="get">
          <div class="login-field">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" placeholder="username" autocomplete="username" />
          </div>

          <div class="login-field">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              value="password"
              autocomplete="current-password"
              aria-label="Password"
            />
          </div>

          <button class="login-submit" type="submit">
            <span>Login</span>
            <span class="login-arrow" aria-hidden="true">&rarr;</span>
          </button>
        </form>

        <footer class="login-card-footer">
          <p>
            Internal use only.
            <a class="login-support-link" href="#">Contact IT Support</a>
          </p>
        </footer>
      </section>

      <footer class="login-page-footer">
        <span>&copy; 2026 Smartx Admin</span>
        <a class="login-privacy-link" href="#">Privacy</a>
      </footer>
    </main>
  </body>
</html>
